name: Keep HF Space Alive

on:
  schedule:
    - cron: "*/25 * * * *"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Wake HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "$(date -u '+%H:%M:%S UTC') - Pinging forextraders/Forex_Trader..."

          RESPONSE=$(curl -s \
            -H "Authorization: Bearer $HF_TOKEN" \
            "https://huggingface.co/api/spaces/forextraders/Forex_Trader")

          echo "Response: $RESPONSE"

          curl -s -X POST \
            -H "Authorization: Bearer $HF_TOKEN" \
            "https://huggingface.co/api/spaces/forextraders/Forex_Trader/restart?factory=false"

          echo "Done"
