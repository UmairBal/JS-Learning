name: Keep HF Space Alive

on:
  schedule:
    - cron: "*/25 * * * *"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Wake HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "$(date -u '+%H:%M:%S UTC') - Pinging Space..."

          RESPONSE=$(curl -s \
            -H "Authorization: Bearer $HF_TOKEN" \
            "https://huggingface.co/api/spaces/Umair1313/Forex_Trader")

          echo "Response: $RESPONSE"

          STAGE=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('runtime',{}).get('stage','unknown'))" 2>/dev/null || echo "unknown")

          echo "Stage: $STAGE"

          curl -s -X POST \
            -H "Authorization: Bearer $HF_TOKEN" \
            "https://huggingface.co/api/spaces/Umair1313/Forex_Trader/restart?factory=false"

          echo "Done - Space will be running shortly"
