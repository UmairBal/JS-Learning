name: Keep HF Space Alive

on:
  schedule:
    - cron: "*/25 * * * *"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Wake HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "$(date -u '+%H:%M:%S UTC') - Restart request for forextraders/Forex_Trader..."
          RESPONSE=$(curl -s -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $HF_TOKEN" \
            "https://huggingface.co/api/spaces/forextraders/Forex_Trader/restart?factory=false")
          
          HTTP_CODE="${RESPONSE: -3}"
          BODY="${RESPONSE%???}"
          
          echo "HTTP status: $HTTP_CODE"
          echo "Response body: $BODY"
          
          if [[ "$HTTP_CODE" == "200" || "$HTTP_CODE" == "204" ]]; then
            echo "Success - Space restart triggered."
          else
            echo "Failed - check token permissions or Space existence."
            exit 1
          fi
          
          echo "Done"
